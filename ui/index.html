<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>plugin-prov · standalone dev</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { createApp, h } from 'vue'
      import plugin from './src/index.js'

      const Fallback = { render: () => h('div', { style: 'padding:1rem' }, `Plugin "${plugin.id}" loaded — no component to render.`) }
      const Root = plugin.component || Fallback
      createApp(Root).mount('#app')
    </script>
  </body>
</html>
